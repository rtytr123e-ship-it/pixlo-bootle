<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💡 Pixel Battle</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
:root{--bg:#0a0a0f;--panel:#12121a;--border:#2a2a3a;--accent:#f5c542;--green:#4ade80;--red:#ff6b6b;--blue:#60a5fa;--text:#e0e0f0;--dim:#666688;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'VT323',monospace;font-size:18px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
input,textarea{user-select:text!important;-webkit-user-select:text!important;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lbox{background:var(--panel);border:2px solid var(--accent);border-radius:12px;padding:28px 24px;display:flex;flex-direction:column;gap:11px;width:290px;}
.llogo{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--accent);text-shadow:0 0 16px var(--accent);text-align:center;line-height:2.2;}
.inp{background:#1a1a28;border:1px solid var(--border);color:var(--text);font-family:'VT323',monospace;font-size:20px;padding:8px 12px;border-radius:6px;outline:none;width:100%;}
.inp:focus{border-color:var(--accent);}
.lbtn{background:var(--accent);border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px;border-radius:6px;cursor:pointer;width:100%;}
.lhint{color:var(--dim);font-size:14px;text-align:center;}
#lerr{color:var(--red);font-size:14px;text-align:center;min-height:18px;}

/* TOP */
#topbar{background:var(--panel);border-bottom:2px solid var(--accent);padding:4px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;z-index:1000;flex-wrap:wrap;}
.logo{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);text-shadow:0 0 8px var(--accent);}
.stat{background:#1a1a28;border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-size:15px;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.v{color:var(--accent);}
#rbar{width:44px;height:4px;background:#222;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:2px;}
#rfill{height:100%;background:var(--blue);width:0%;transition:width 1s linear;}

/* MAP */
#map{flex:1;z-index:1;position:relative;}
.leaflet-container{background:#0d1a2e!important;}

/* ZOOM HINT */
#zoom-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,20,.88);color:var(--accent);font-family:'Press Start 2P',monospace;font-size:9px;padding:14px 18px;border-radius:8px;z-index:800;text-align:center;line-height:2.2;pointer-events:none;display:none;}

/* BOTTOM */
#bottombar{background:var(--panel);border-top:2px solid var(--border);padding:5px 8px;display:flex;align-items:center;gap:5px;flex-shrink:0;z-index:1000;flex-wrap:wrap;}
#palette{display:flex;gap:3px;flex-wrap:wrap;max-width:185px;}
.clr{width:24px;height:24px;border-radius:3px;border:2px solid transparent;cursor:pointer;transition:transform .1s;}
.clr:hover{transform:scale(1.15);}
.clr.active{border-color:#fff;transform:scale(1.2);box-shadow:0 0 7px rgba(255,255,255,.7);}
.clr.locked{opacity:0.2;cursor:not-allowed;filter:grayscale(1);}
#paint-btn{font-family:'Press Start 2P',monospace;font-size:7px;background:#1a1a28;border:2px solid var(--accent);color:var(--accent);padding:6px 9px;border-radius:6px;cursor:pointer;line-height:1.8;white-space:nowrap;}
#paint-btn.active{background:var(--accent);color:#000;}
#confirm-btn,#cancel-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:6px 9px;border-radius:6px;cursor:pointer;border:2px solid;display:none;white-space:nowrap;}
#confirm-btn{background:var(--green);border-color:var(--green);color:#000;}
#cancel-btn{background:transparent;border-color:var(--red);color:var(--red);}
#right-btns{margin-left:auto;display:flex;gap:5px;}
.icon-btn{font-family:'VT323',monospace;font-size:15px;background:#1a1a28;border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:5px;cursor:pointer;}
.icon-btn:hover,.icon-btn.on{border-color:var(--accent);color:var(--accent);}

/* PANELS - fixed height, proper scroll */
.panel{
  position:absolute;left:0;right:0;bottom:58px;
  background:rgba(10,10,20,.98);
  border-top:2px solid var(--border);
  z-index:900;
  display:none;
  flex-direction:column;
  height:300px;
}
.panel.open{display:flex;}
.ptitle{
  font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dim);
  padding:6px 10px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.pclose{cursor:pointer;color:var(--red);font-size:18px;padding:0 4px;}

/* CHAT */
#chat-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.ctab{flex:1;text-align:center;padding:6px;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer;color:var(--dim);background:transparent;border:none;}
.ctab.active{color:var(--accent);border-bottom:2px solid var(--accent);}
#chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:5px 10px;font-size:15px;display:flex;flex-direction:column;gap:2px;}
#chat-msgs::-webkit-scrollbar{width:3px;}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border);}
.msg-sys{color:var(--accent);font-size:13px;}
.msg-usr .nick{color:var(--green);}
.msg-usr .txt{color:#ccc;}

/* Chat input row - always at bottom */
#chat-input-row{display:flex;border-top:1px solid var(--border);padding:6px 8px;gap:5px;flex-shrink:0;background:var(--panel);}
#chat-input{
  flex:1;background:#1a1a28;border:1px solid var(--border);
  color:var(--text);font-family:'VT323',monospace;font-size:18px;
  padding:6px 10px;border-radius:6px;outline:none;
  /* Force keyboard on Android */
  -webkit-appearance:none;
}
#chat-input:focus{border-color:var(--accent);}
#chat-send{
  background:var(--accent);border:none;color:#000;
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;
}

/* SHOP - scrollable inner */
#shop-panel .panel-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px;display:flex;flex-direction:column;gap:6px;
}
.shop-sect{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);padding:4px 0 2px;}
.sitem{background:#1a1a28;border:1px solid var(--border);border-radius:6px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;font-size:15px;gap:6px;}
.sitem-info{flex:1;}
.sitem small{color:var(--dim);font-size:12px;display:block;}
.price{color:var(--accent);font-size:14px;white-space:nowrap;}
.bbtn{background:var(--accent);border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 7px;border-radius:4px;cursor:pointer;white-space:nowrap;}

/* CLAN - scrollable inner */
#clan-panel .panel-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px;display:flex;flex-direction:column;gap:6px;
}
.clan-btn{background:#1a1a28;border:1px solid var(--accent);color:var(--accent);font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 12px;border-radius:6px;cursor:pointer;width:100%;}
.crow{background:#1a1a28;border:1px solid var(--border);border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:15px;gap:6px;}
.ctag{font-family:'Press Start 2P',monospace;font-size:7px;padding:2px 5px;border-radius:3px;margin-right:4px;}
.jbtn{background:var(--blue);border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 8px;border-radius:4px;cursor:pointer;white-space:nowrap;}

/* NOTIFY */
#notify{position:fixed;top:14%;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 20px;border-radius:8px;z-index:9998;display:none;text-align:center;line-height:2.2;box-shadow:0 0 40px var(--accent);max-width:88vw;word-break:break-word;}
#tooltip{position:absolute;background:rgba(10,10,20,.96);border:1px solid var(--accent);padding:3px 10px;font-size:14px;pointer-events:none;display:none;z-index:999;border-radius:3px;color:var(--accent);white-space:nowrap;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="llogo">💡 PIXEL<br>BATTLE</div>
    <input class="inp" id="ln" placeholder="Ник" maxlength="16" autocomplete="off" type="text"/>
    <input class="inp" id="lp" placeholder="Пароль" maxlength="32" type="password"/>
    <button class="lbtn" onclick="doLogin()">ВОЙТИ / РЕГИСТРАЦИЯ</button>
    <div id="lerr"></div>
    <div class="lhint">Новый ник = новый аккаунт</div>
  </div>
</div>

<!-- TOP -->
<div id="topbar">
  <div class="logo">💡PB</div>
  <div class="stat"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;"></span>&nbsp;<span class="v" id="s-nick">—</span></div>
  <div class="stat">Ур.<span class="v" id="s-lvl">1</span></div>
  <div class="stat">💡<span class="v" id="s-bulbs">0</span></div>
  <div class="stat">🎨<span class="v" id="s-ink">15</span>/<span class="v" id="s-imax">15</span><div id="rbar"><div id="rfill"></div></div></div>
  <div class="stat" style="font-size:13px;">XP<span class="v" id="s-xp">0</span>/<span id="s-xpmax">100</span></div>
</div>

<!-- MAP -->
<div id="map">
  <div id="zoom-hint">🔍 Приблизь карту<br>чтобы рисовать!</div>
</div>
<div id="tooltip"></div>

<!-- CHAT PANEL -->
<div class="panel" id="chat-panel">
  <div id="chat-tabs">
    <button class="ctab active" id="tab-global" onclick="switchTab('global')">🌍 ГЛОБАЛЬНЫЙ</button>
    <button class="ctab" id="tab-clan" onclick="switchTab('clan')">⚔️ КЛАН</button>
  </div>
  <div id="chat-msgs"></div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="Нажми чтобы писать..." maxlength="120" type="text" autocomplete="off"/>
    <button id="chat-send" onclick="sendChat()">OK</button>
  </div>
</div>

<!-- SHOP PANEL -->
<div class="panel" id="shop-panel">
  <div class="ptitle">🏪 МАГАЗИН <span class="pclose" onclick="closeAll()">✕</span></div>
  <div class="panel-body">
    <div class="shop-sect">КРАСКИ</div>
    <div class="sitem">
      <div class="sitem-info">🎨 +10 красок<small>Мгновенно</small></div>
      <span class="price">💡 100</span><button class="bbtn" onclick="buy('ink10')">КУПИТЬ</button>
    </div>
    <div class="shop-sect">ПРИВАТ (центр = текущий вид)</div>
    <div class="sitem">
      <div class="sitem-info">🔒 Приват 15 мин<small>Радиус ~25км · 3 чел</small></div>
      <span class="price" id="p1p">💡 500</span><button class="bbtn" onclick="buy('priv1')">КУПИТЬ</button>
    </div>
    <div class="sitem">
      <div class="sitem-info">🔒 Приват 30 мин<small>Радиус ~50км · 7 чел</small></div>
      <span class="price" id="p2p">💡 1500</span><button class="bbtn" onclick="buy('priv2')">КУПИТЬ</button>
    </div>
  </div>
</div>

<!-- CLAN PANEL -->
<div class="panel" id="clan-panel">
  <div class="ptitle">👥 КЛАНЫ <span class="pclose" onclick="closeAll()">✕</span></div>
  <div class="panel-body" id="clan-inner"></div>
</div>

<!-- BOTTOM -->
<div id="bottombar">
  <div id="palette"></div>
  <button id="paint-btn" onclick="togglePaint()">PAINT<br><span id="pctr">15/15</span></button>
  <button id="confirm-btn" onclick="confirmPx()">✓ ОК</button>
  <button id="cancel-btn" onclick="cancelPx()">✗</button>
  <div id="right-btns">
    <button class="icon-btn" id="btn-chat" onclick="togglePanel('chat-panel','btn-chat')">💬</button>
    <button class="icon-btn" id="btn-clan" onclick="togglePanel('clan-panel','btn-clan');loadClanPanel()">👥</button>
    <button class="icon-btn" id="btn-shop" onclick="togglePanel('shop-panel','btn-shop')">🏪</button>
  </div>
</div>

<div id="notify"></div>

<script>
// ══ FIREBASE ══
firebase.initializeApp({databaseURL:"https://pixel-battle-fb897-default-rtdb.firebaseio.com"});
const db=firebase.database();

// ══ COLORS ══
const ALL_COLORS=[
  '#ff0000','#ff8800','#ffff00','#00cc00','#00cccc','#0000ff','#cc00cc','#ffffff',
  '#ff6666','#ffaa44','#aaff44','#44ffcc','#44aaff','#aa44ff','#ff44aa','#aaaaaa',
  '#880000','#884400','#448800','#006644','#004488','#440088','#880044','#555555',
  '#ffcccc','#ffeecc','#ccffcc','#ccffee','#cceeff','#eeccff','#ffccee','#333333',
  '#ff3300','#ff6600','#ff9900','#ffcc00','#ccff00','#99ff00','#00ff66','#00ffcc',
  '#00ffff','#00ccff','#0099ff','#0066ff','#3300ff','#6600ff','#9900ff','#cc00ff',
  '#ff00cc','#ff0066','#990000','#994400','#999900','#009900','#009999','#000099',
  '#990099','#664422','#446622','#224466','#662244','#ffddbb','#bbffdd','#bbddff',
  '#222222','#444444','#666666','#888888','#aaaaaa','#cccccc','#ff8866','#66ff88',
  '#8866ff','#ff6688','#ffaa88','#88ffaa','#aa88ff','#ffaa00','#00ffaa','#aa00ff',
  '#dd2200','#00dd22','#2200dd','#ddaa00','#00ddaa','#aa00dd','#552200','#005522',
  '#220055','#225500','#002255','#554400','#005544','#440055','#ff77aa','#77ffaa',
  '#aa77ff','#ffaa77','#aaffaa','#aaaaff','#ffaaaa','#aaffff','#ffeeaa','#aaffee',
  '#bb5500','#00bb55','#5500bb','#bb0055','#55bb00','#0055bb','#bbaa00','#00bbaa',
  '#aa00bb','#bb00aa','#aabb00','#00aabb','#331100','#003311','#110033','#330011'
];

// ══ STATE ══
let P=null, paintMode=false, ghosts=[], selColor='#ff0000';
let privBuys=[0,0], restProg=0, chatTab='global';
const pxLayers={}, pxData={}, privetLayers=[];
let privZones=[];

// ══ LOGIN ══
function lerr(m){document.getElementById('lerr').textContent=m;}
async function doLogin(){
  const nick=document.getElementById('ln').value.trim();
  const pass=document.getElementById('lp').value.trim();
  if(!nick||!pass){lerr('Введи ник и пароль!');return;}
  if(nick.length<2){lerr('Ник минимум 2 символа!');return;}
  if(/[.#$/\[\]]/.test(nick)){lerr('Недопустимые символы!');return;}
  const ref=db.ref('players/'+nick);
  const snap=await ref.once('value');
  if(snap.exists()){
    const d=snap.val();
    if(d.pass!==pass){lerr('Неверный пароль!');return;}
    P=d;
    if(P.lastSave){const away=Math.floor((Date.now()-P.lastSave)/1000);P.ink=Math.min(P.inkMax,P.ink+Math.floor(away/30));}
  } else {
    P={nick,pass,level:1,xp:0,ink:15,inkMax:15,bulbs:0,
       colors:ALL_COLORS.slice(0,8),privBuys:[0,0],privCosts:[500,1500],clan:'',lastSave:Date.now()};
    await ref.set(P);
    pushChat(null,'🆕 '+nick+' вошёл в игру!','sys','');
  }
  privBuys=P.privBuys||[0,0];
  document.getElementById('login-screen').style.display='none';
  initUI(); startRestore(); listenPixels(); listenChat(); listenPrivet();
}
function saveP(){
  if(!P)return; P.lastSave=Date.now();
  db.ref('players/'+P.nick).update({
    level:P.level,xp:P.xp,ink:P.ink,inkMax:P.inkMax,
    bulbs:P.bulbs,colors:P.colors,privBuys,privCosts:P.privCosts||[500,1500],
    clan:P.clan||'',lastSave:P.lastSave
  });
}

// ══ UI ══
function initUI(){updStats();buildPal();}
function updStats(){
  if(!P)return;
  const tag=P.clan?'['+P.clan+'] ':'';
  document.getElementById('s-nick').textContent=tag+P.nick;
  document.getElementById('s-lvl').textContent=P.level;
  document.getElementById('s-bulbs').textContent=P.bulbs;
  document.getElementById('s-ink').textContent=P.ink;
  document.getElementById('s-imax').textContent=P.inkMax;
  document.getElementById('pctr').textContent=P.ink+'/'+P.inkMax;
  const need=P.level<=5?100:250;
  document.getElementById('s-xp').textContent=P.xp;
  document.getElementById('s-xpmax').textContent=need;
  const c=P.privCosts||[500,1500];
  document.getElementById('p1p').textContent='💡 '+c[0];
  document.getElementById('p2p').textContent='💡 '+c[1];
}
function buildPal(){
  const pal=document.getElementById('palette'); pal.innerHTML='';
  const unlocked=P.colors.length;
  const show=Math.min(unlocked+2,ALL_COLORS.length);
  ALL_COLORS.slice(0,show).forEach((c,i)=>{
    const b=document.createElement('div');
    const lk=i>=unlocked;
    b.className='clr'+(lk?' locked':'')+(c===selColor&&!lk?' active':'');
    b.style.background=c;
    if(!lk)b.onclick=()=>{selColor=c;buildPal();};
    else b.title='🔒 Ур.'+(i+1);
    pal.appendChild(b);
  });
}

// ══ MAP ══
const MIN_ZOOM=7; // pixels visible only at zoom >= 7

const map=L.map('map',{
  center:[30,20],zoom:3,
  zoomControl:true,attributionControl:false,
  doubleClickZoom:false,   // FIX: no double-tap zoom
  maxBounds:[[-85,-200],[85,200]],
  maxBoundsViscosity:0.9
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  maxZoom:19,minZoom:2,opacity:0.92
}).addTo(map);

function pxDeg(){
  const z=map.getZoom();
  if(z<=7)return 0.018;
  if(z<=9)return 0.007;
  if(z<=11)return 0.0025;
  if(z<=13)return 0.0008;
  return 0.0003;
}
function snap(ll){const s=pxDeg();return{lat:Math.round(ll.lat/s)*s,lng:Math.round(ll.lng/s)*s};}
function pkey(lat,lng){
  return (lat>=0?'N':'S')+Math.abs(lat).toFixed(5).replace('.','x')+'_'+(lng>=0?'E':'W')+Math.abs(lng).toFixed(5).replace('.','x');
}

function checkZoomHint(){
  document.getElementById('zoom-hint').style.display=map.getZoom()<MIN_ZOOM?'block':'none';
}
map.on('zoomend',checkZoomHint); checkZoomHint();

// ══ PAINT ══
map.on('click',function(e){
  if(!paintMode||!P)return;
  if(map.getZoom()<MIN_ZOOM){notify('🔍 Приблизь карту чтобы рисовать!');return;}
  if(P.ink<=0&&!ghosts.find(g=>g.k===pkey(snap(e.latlng).lat,snap(e.latlng).lng))){notify('❌ Нет красок!');return;}
  const sn=snap(e.latlng);
  const k=pkey(sn.lat,sn.lng);
  // Replace existing ghost — free recolor
  const ei=ghosts.findIndex(g=>g.k===k);
  if(ei!==-1){
    map.removeLayer(ghosts[ei].r);
    const s=pxDeg();
    const r=makeGhostRect(sn,s);
    ghosts[ei]={k,lat:sn.lat,lng:sn.lng,color:selColor,r};
    return;
  }
  if(P.ink<=0){notify('❌ Нет красок!');return;}
  const s=pxDeg();
  const r=makeGhostRect(sn,s);
  P.ink--;
  ghosts.push({k,lat:sn.lat,lng:sn.lng,color:selColor,r});
  updStats();
});

function makeGhostRect(sn,s){
  return L.rectangle([[sn.lat-s/2,sn.lng-s/2],[sn.lat+s/2,sn.lng+s/2]],
    {color:selColor,fillColor:selColor,fillOpacity:0.4,weight:1,opacity:0.6,dashArray:'5,3'}).addTo(map);
}

function togglePaint(){
  if(!P)return;
  paintMode=!paintMode;
  document.getElementById('paint-btn').classList.toggle('active',paintMode);
  document.getElementById('confirm-btn').style.display=paintMode?'inline-block':'none';
  document.getElementById('cancel-btn').style.display=paintMode?'inline-block':'none';
  if(paintMode){map.dragging.disable();map.scrollWheelZoom.disable();}
  else{map.dragging.enable();map.scrollWheelZoom.enable();}
}
function confirmPx(){
  if(!ghosts.length){togglePaint();return;}
  const updates={};let blocked=0;
  ghosts.forEach(g=>{
    if(isPrivBlocked(g.lat,g.lng)){blocked++;map.removeLayer(g.r);P.ink++;return;}
    updates['pixels/'+g.k]={lat:g.lat,lng:g.lng,color:g.color,nick:P.nick,clan:P.clan||'',t:Date.now()};
  });
  if(Object.keys(updates).length){db.ref().update(updates);}
  const cnt=Object.keys(updates).length;
  if(cnt){
    const bpp=5+(P.level-1)*2;
    P.bulbs+=cnt*bpp; P.xp+=cnt;
    checkLvl();
    pushChat(null,P.nick+' поставил '+cnt+' пкс (+'+cnt*bpp+'💡)','sys','');
  }
  if(blocked) notify('❌ '+blocked+' пикс. заблокировано приватом!');
  ghosts=[]; saveP(); updStats(); togglePaint();
}
function cancelPx(){
  ghosts.forEach(g=>{map.removeLayer(g.r);P.ink++;});
  ghosts=[]; updStats(); togglePaint();
}

// ══ PIXELS REALTIME ══
function listenPixels(){
  db.ref('pixels').once('value',s=>{
    const all=s.val()||{};
    Object.entries(all).forEach(([k,px])=>{pxData[k]=px;if(map.getZoom()>=MIN_ZOOM)drawPx(k,px);});
  });
  db.ref('pixels').on('child_added',s=>{
    const k=s.key,px=s.val();
    if(!pxData[k]){pxData[k]=px;if(map.getZoom()>=MIN_ZOOM)drawPx(k,px);}
  });
  db.ref('pixels').on('child_changed',s=>{
    const k=s.key,px=s.val();
    pxData[k]=px;if(map.getZoom()>=MIN_ZOOM)drawPx(k,px);
  });
}
function drawPx(k,px){
  if(pxLayers[k])map.removeLayer(pxLayers[k]);
  const s=pxDeg();
  const r=L.rectangle([[px.lat-s/2,px.lng-s/2],[px.lat+s/2,px.lng+s/2]],
    {color:px.color,fillColor:px.color,fillOpacity:0.92,weight:0.1,interactive:true}).addTo(map);
  pxLayers[k]=r;
  r.on('click',function(e){
    if(paintMode)return;
    tipAt(e.originalEvent.clientX,e.originalEvent.clientY,'👤 '+(px.clan?'['+px.clan+'] ':'')+px.nick);
    setTimeout(hideTip,2500);
  });
}
map.on('zoomend',()=>{
  const z=map.getZoom();
  Object.keys(pxLayers).forEach(k=>{map.removeLayer(pxLayers[k]);delete pxLayers[k];});
  if(z>=MIN_ZOOM) Object.entries(pxData).forEach(([k,px])=>drawPx(k,px));
  redrawPrivet();
});

// ══ LEVEL UP ══
function checkLvl(){
  const need=P.level<=5?100:250;
  if(P.xp>=need){
    P.xp-=need; P.level++; P.inkMax+=5; P.ink=Math.min(P.ink+2,P.inkMax);
    if(P.level>=10) P.colors=ALL_COLORS.slice();
    else P.colors=ALL_COLORS.slice(0,Math.min(P.colors.length+1,ALL_COLORS.length));
    notify('🎉 УРОВЕНЬ '+P.level+'!\n'+(P.level>=10?'🎨 128 ЦВЕТОВ!':'+5 краски · +1 цвет'));
    buildPal(); checkLvl();
  }
}

// ══ INK RESTORE ══
function startRestore(){
  setInterval(()=>{
    if(!P)return;
    restProg+=100/30;
    document.getElementById('rfill').style.width=Math.min(restProg,100)+'%';
    if(restProg>=100){restProg=0;if(P.ink<P.inkMax){P.ink++;saveP();updStats();}}
  },1000);
}

// ══ CHAT ══
function listenChat(){
  db.ref('chat').limitToLast(60).on('value',s=>{
    if(chatTab==='global') renderMsgs(Object.values(s.val()||{}));
  });
}
function switchTab(tab){
  chatTab=tab;
  document.getElementById('tab-global').classList.toggle('active',tab==='global');
  document.getElementById('tab-clan').classList.toggle('active',tab==='clan');
  if(tab==='global'){
    db.ref('chat').limitToLast(60).once('value',s=>renderMsgs(Object.values(s.val()||{})));
  } else {
    if(!P||!P.clan){renderMsgs([{type:'sys',txt:'Ты не в клане! Вступи через 👥',t:0}]);return;}
    db.ref('clan_chat/'+P.clan).limitToLast(60).once('value',s=>renderMsgs(Object.values(s.val()||{})));
    // listen live for clan
    db.ref('clan_chat/'+P.clan).limitToLast(60).on('value',s=>{
      if(chatTab==='clan') renderMsgs(Object.values(s.val()||{}));
    });
  }
}
function renderMsgs(arr){
  arr.sort((a,b)=>a.t-b.t);
  const c=document.getElementById('chat-msgs'); c.innerHTML='';
  arr.forEach(m=>{
    const d=document.createElement('div');
    if(m.type==='sys'){d.className='msg-sys';d.textContent=m.txt;}
    else{
      d.className='msg-usr';
      const tag=m.clan?'<b style="color:var(--blue)">['+m.clan+']</b> ':'';
      d.innerHTML=tag+'<span class="nick">'+esc(m.nick)+':</span> <span class="txt">'+esc(m.txt)+'</span>';
    }
    c.appendChild(d);
  });
  c.scrollTop=c.scrollHeight;
}
function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pushChat(nick,txt,type,clan){db.ref('chat').push({nick,txt,type,clan:clan||'',t:Date.now()});}
function pushClanChat(nick,txt,clan){db.ref('clan_chat/'+clan).push({nick,txt,type:'usr',clan,t:Date.now()});}
function sendChat(){
  const inp=document.getElementById('chat-input');
  const t=inp.value.trim(); if(!t||!P)return;
  if(chatTab==='global'){
    pushChat(P.nick,t,'usr',P.clan||'');
  } else {
    if(!P.clan){notify('Вступи в клан!');return;}
    pushClanChat(P.nick,t,P.clan);
  }
  inp.value='';
  inp.focus(); // keep keyboard open
}
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

// ══ SHOP ══
function buy(type){
  if(!P)return;
  const costs=P.privCosts||[500,1500];
  if(type==='ink10'){
    if(P.bulbs<100){notify('Нужно 💡100!');return;}
    P.bulbs-=100; P.ink=Math.min(P.ink+10,P.inkMax); notify('🎨 +10 красок!');
  } else if(type==='priv1'){
    if(P.bulbs<costs[0]){notify('Нужно 💡'+costs[0]+'!');return;}
    P.bulbs-=costs[0]; privBuys[0]++;
    if(Math.random()<0.5) costs[0]+=5; // 50% шанс +5
    P.privCosts=costs; P.privBuys=privBuys;
    activatePrivet(15*60, 25000); // 25km radius
    notify('🔒 Приват 15 мин активирован!');
  } else if(type==='priv2'){
    if(P.bulbs<costs[1]){notify('Нужно 💡'+costs[1]+'!');return;}
    P.bulbs-=costs[1]; privBuys[1]++;
    if(Math.random()<0.5) costs[1]+=5;
    P.privCosts=costs; P.privBuys=privBuys;
    activatePrivet(30*60, 50000); // 50km radius
    notify('🔒 Приват 30 мин активирован!');
  }
  saveP(); updStats();
}

// ══ PRIVET — FIXED GEOGRAPHIC RADIUS (meters) ══
function activatePrivet(durationSec, radiusMeters){
  const c=map.getCenter();
  db.ref('privet').push({
    nick:P.nick,clan:P.clan||'',
    lat:c.lat,lng:c.lng,
    radiusM:radiusMeters,  // fixed meters, not zoom-dependent
    expireAt:Date.now()+durationSec*1000,
    t:Date.now()
  });
}
function listenPrivet(){
  db.ref('privet').on('value',s=>{
    const all=s.val()||{};
    privZones=[];
    const now=Date.now();
    Object.entries(all).forEach(([k,z])=>{
      if(z.expireAt<now){db.ref('privet/'+k).remove();return;}
      // Support both old (radius px) and new (radiusM)
      privZones.push({...z, radiusM: z.radiusM||25000});
    });
    redrawPrivet();
  });
}
function redrawPrivet(){
  privetLayers.forEach(l=>map.removeLayer(l));
  privetLayers.length=0;
  const now=Date.now();
  privZones.forEach(z=>{
    if(z.expireAt<now)return;
    const mins=Math.ceil((z.expireAt-now)/60000);
    // Leaflet circle radius is in meters — stays same size regardless of zoom
    const c=L.circle([z.lat,z.lng],{
      radius:z.radiusM,
      color:'#f5c542',fillColor:'#f5c542',
      fillOpacity:0.06,weight:2,dashArray:'8,5',opacity:0.8
    }).addTo(map);
    c.bindTooltip('🔒 '+(z.clan?'['+z.clan+'] ':'')+z.nick+' · '+mins+'мин',{permanent:false,direction:'center'});
    privetLayers.push(c);
  });
}
function isPrivBlocked(lat,lng){
  const now=Date.now();
  for(const z of privZones){
    if(z.expireAt<now)continue;
    if(P.clan&&z.clan&&P.clan===z.clan)continue;
    if(z.nick===P.nick)continue;
    // Geographic distance in meters
    const R=6371000;
    const dLat=(lat-z.lat)*Math.PI/180;
    const dLng=(lng-z.lng)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(z.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLng/2)**2;
    const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    if(dist<z.radiusM)return true;
  }
  return false;
}

// ══ CLANS ══
function loadClanPanel(){
  const inner=document.getElementById('clan-inner');
  inner.innerHTML='<div style="color:var(--dim);font-size:14px;">Загрузка...</div>';
  db.ref('clans').once('value',s=>{
    const clans=s.val()||{};
    inner.innerHTML='';
    if(P.clan){
      const cl=clans[P.clan];
      if(cl){
        const mc=Object.keys(cl.members||{}).length;
        inner.innerHTML=`
          <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);">МОЙ КЛАН</div>
          <div class="crow" style="flex-direction:column;align-items:flex-start;gap:3px;">
            <div><span class="ctag" style="background:${cl.color||'#444'};color:#fff;">[${P.clan}]</span><b>${esc(cl.name)}</b></div>
            <div style="font-size:13px;color:var(--dim);">Участников: ${mc}/150 · 👑 ${esc(cl.owner)}</div>
          </div>
          <button class="clan-btn" style="background:var(--red);border-color:var(--red);color:#fff;" onclick="leaveClan()">ПОКИНУТЬ КЛАН</button>`;
        return;
      }
    }
    // Not in clan
    inner.innerHTML=`
      <button class="clan-btn" onclick="toggleCF()">+ СОЗДАТЬ КЛАН</button>
      <div id="ccf" style="display:none;flex-direction:column;gap:6px;">
        <input class="inp" id="cn" placeholder="Название" maxlength="24" type="text"/>
        <input class="inp" id="ct" placeholder="ТЕГ (2-5 букв)" maxlength="5" type="text"/>
        <div style="display:flex;align-items:center;gap:8px;font-size:15px;">Цвет: <input type="color" id="cc" value="#4ade80" style="width:50px;height:30px;border:none;border-radius:4px;cursor:pointer;"></div>
        <button class="clan-btn" onclick="createClan()">СОЗДАТЬ</button>
      </div>
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--accent);margin-top:4px;">ВСЕ КЛАНЫ</div>
      <div id="clan-list"></div>`;
    const list=document.getElementById('clan-list');
    const entries=Object.entries(clans);
    if(!entries.length){list.innerHTML='<div style="color:var(--dim);font-size:14px;text-align:center;padding:8px;">Кланов нет — создай первый!</div>';return;}
    entries.slice(0,30).forEach(([tag,cl])=>{
      const mc=Object.keys(cl.members||{}).length;
      const row=document.createElement('div'); row.className='crow';
      row.innerHTML=`<div><span class="ctag" style="background:${cl.color||'#444'};color:#fff;">[${esc(tag)}]</span><b>${esc(cl.name)}</b><div style="font-size:12px;color:var(--dim);">${mc}/150 · 👑${esc(cl.owner)}</div></div><button class="jbtn" onclick="joinClan('${esc(tag)}')">ВСТУПИТЬ</button>`;
      list.appendChild(row);
    });
  });
}
function toggleCF(){const f=document.getElementById('ccf');if(f)f.style.display=f.style.display==='none'?'flex':'none';}
async function createClan(){
  const name=(document.getElementById('cn')||{}).value?.trim();
  const tag=(document.getElementById('ct')||{}).value?.trim().toUpperCase();
  const color=(document.getElementById('cc')||{}).value;
  if(!name||!tag||tag.length<2){notify('Введи название и тег (2-5 букв)!');return;}
  const snap=await db.ref('clans/'+tag).once('value');
  if(snap.exists()){notify('Тег уже занят!');return;}
  await db.ref('clans/'+tag).set({name,tag,color,owner:P.nick,members:{[P.nick]:true},created:Date.now()});
  P.clan=tag; saveP();
  pushChat(null,'⚔️ '+P.nick+' создал клан ['+tag+'] '+name+'!','sys','');
  notify('⚔️ Клан ['+tag+'] создан!');
  loadClanPanel(); updStats();
}
async function joinClan(tag){
  const snap=await db.ref('clans/'+tag).once('value');
  if(!snap.exists()){notify('Клан не найден!');return;}
  const cl=snap.val();
  if(Object.keys(cl.members||{}).length>=150){notify('Клан полон!');return;}
  await db.ref('clans/'+tag+'/members/'+P.nick).set(true);
  P.clan=tag; saveP();
  pushChat(null,'➕ '+P.nick+' вступил в ['+tag+']!','sys','');
  notify('✅ Добро пожаловать в ['+tag+']!');
  loadClanPanel(); updStats();
}
async function leaveClan(){
  if(!P.clan)return;
  const tag=P.clan;
  await db.ref('clans/'+tag+'/members/'+P.nick).remove();
  pushChat(null,'➖ '+P.nick+' покинул ['+tag+']','sys','');
  P.clan=''; saveP(); notify('Ты покинул клан.'); loadClanPanel(); updStats();
}

// ══ PANELS ══
function togglePanel(id,btnId){
  const panel=document.getElementById(id);
  const isOpen=panel.classList.contains('open');
  closeAll();
  if(!isOpen){
    panel.classList.add('open');
    if(btnId)document.getElementById(btnId).classList.add('on');
    if(id==='chat-panel'){setTimeout(()=>{switchTab(chatTab);},50);}
  }
}
function closeAll(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('on'));
}

// ══ TOOLTIP / NOTIFY ══
const ttip=document.getElementById('tooltip');
function tipAt(x,y,t){ttip.style.display='block';ttip.style.left=(x+10)+'px';ttip.style.top=(y-34)+'px';ttip.textContent=t;}
function hideTip(){ttip.style.display='none';}
let ntimer=null;
function notify(t){
  const el=document.getElementById('notify');
  el.innerHTML=t.replace(/\n/g,'<br>');
  el.style.display='block';
  clearTimeout(ntimer);
  ntimer=setTimeout(()=>el.style.display='none',3000);
}

// ══ ENTER KEY ══
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
